name: generate-profile-graphics

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day at midnight
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Generate contribution snake SVGs (saves to dist/)
      - name: Generate contribution snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Tamizh019
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 2. Generate 3D contribution calendar SVGs (saves to profile-3d-contrib/)
      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Tamizh019

      # 3. Copy 3D SVGs into the dist/ directory so they are packaged together
      - name: Combine files
        run: |
          sudo cp -r profile-3d-contrib/* dist/

      # 4. Push everything in dist/ to the output branch
      - name: Push profile assets to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
